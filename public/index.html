<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kamaai Bot</title>

<style>

body{
margin:0;
font-family: Arial, sans-serif;
background:#e5ddd5;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

header{
background:#075E54;
color:white;
padding:15px;
font-size:20px;
text-align:center;
font-weight:bold;
}

/* CHAT AREA */

#chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
}

/* MESSAGE */

.message{
max-width:75%;
padding:12px;
margin:6px;
border-radius:10px;
font-size:17px;
line-height:1.4;
position:relative;
cursor:pointer;
}

/* USER MESSAGE */

.user{
align-self:flex-end;
background:#dcf8c6;
}

/* BOT MESSAGE */

.bot{
align-self:flex-start;
background:white;
}

/* TIME */

.time{
font-size:11px;
color:gray;
text-align:right;
margin-top:5px;
}

/* INPUT AREA */

#inputArea{
display:flex;
padding:10px;
background:white;
border-top:1px solid #ccc;
}

#msg{
flex:1;
padding:12px;
font-size:17px;
border-radius:25px;
border:1px solid #ccc;
outline:none;
}

button{
margin-left:8px;
padding:10px 15px;
border:none;
border-radius:50px;
font-size:16px;
background:#25D366;
color:white;
cursor:pointer;
}

/* MOBILE */

@media (max-width:600px){

.message{
font-size:18px;
}

#msg{
font-size:18px;
}

}

</style>
</head>

<body>

<header>🤖 Kamaai Bot</header>

<div id="chat"></div>

<div id="inputArea">

<input id="msg" placeholder="Type a message...">

<button onclick="send()">➤</button>

<button onclick="clearChat()">🗑</button>

</div>

<script>

let memory=[]

function time(){

let now=new Date()

let h=now.getHours()
let m=now.getMinutes()

if(m<10) m="0"+m

return h+":"+m
}

/* ADD MESSAGE */

function addMessage(text,type){

let chat=document.getElementById("chat")

let div=document.createElement("div")

div.className="message "+type

div.innerHTML=text+"<div class='time'>"+time()+"</div>"

/* DELETE MESSAGE ON CLICK */

div.onclick=function(){

if(confirm("Delete this message?")){

div.remove()

}

}

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

/* BOT BRAIN */

function botReply(msg){

msg=msg.toLowerCase()

if(msg.includes("sad"))
return "I'm here for you. Things will get better ❤️"

if(msg.includes("stress"))
return "Take a deep breath. You are stronger than you think 💪"

if(msg.includes("hello"))
return "Hello! I'm Kamaai bot. How are you today? 😊"

if(msg.includes("motivate"))
return "You can achieve anything with patience and hard work 🚀"

return "I'm listening. Tell me more 🙂"

}

/* SEND */

function send(){

let input=document.getElementById("msg")

let msg=input.value.trim()

if(msg==="") return

addMessage(msg,"user")

memory.push(msg)

let reply=botReply(msg)

setTimeout(()=>{

addMessage(reply,"bot")

speak(reply)

memory.push(reply)

},500)

input.value=""

}

/* ENTER KEY */

document.getElementById("msg").addEventListener("keypress",function(e){

if(e.key==="Enter") send()

})

/* VOICE */

function speak(text){

let speech=new SpeechSynthesisUtterance(text)

speech.lang="en-US"

window.speechSynthesis.speak(speech)

}

/* CLEAR ALL CHAT */

function clearChat(){

document.getElementById("chat").innerHTML=""

memory=[]

}

</script>

</body>
</html>
