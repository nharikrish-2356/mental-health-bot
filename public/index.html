<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Safe Space - Calm AI</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:"Segoe UI",sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(-45deg,#fbc2eb,#a6c1ee,#fddb92,#d4fc79);
background-size:400% 400%;
animation:gradientFlow 20s ease infinite;
}

@keyframes gradientFlow{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* APP CONTAINER */

.app{

width:100%;
max-width:420px;
height:100vh;

background:rgba(255,255,255,0.85);
backdrop-filter:blur(15px);

display:flex;
flex-direction:column;

border-radius:0;
overflow:hidden;
}

/* HEADER */

.header{

padding:14px;
display:flex;
align-items:center;

font-weight:bold;
font-size:16px;

border-bottom:1px solid rgba(0,0,0,0.05);
}

.controls{
margin-left:auto;
display:flex;
gap:6px;
}

.controls button{
border:none;
background:white;
border-radius:50%;
width:34px;
height:34px;
cursor:pointer;
}

/* CHAT AREA */

.chat-area{

flex:1;
padding:15px;
overflow-y:auto;

display:flex;
flex-direction:column;

-webkit-overflow-scrolling:touch;
}

/* MESSAGE */

.message{

max-width:75%;
padding:10px 14px;
border-radius:15px;
margin-bottom:8px;
font-size:14px;

animation:fadeIn .3s ease;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(6px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.bot{
background:white;
align-self:flex-start;
}

.user{
background:linear-gradient(135deg,#d4fc79,#96e6a1);
align-self:flex-end;
}

/* INPUT AREA */

.input-area{

display:flex;
padding:10px;
gap:6px;

border-top:1px solid rgba(0,0,0,0.05);
}

input{

flex:1;
padding:12px 16px;

border-radius:20px;
border:none;

outline:none;

font-size:16px;
}

.icon-btn{

border:none;
border-radius:50%;

width:40px;
height:40px;

font-size:16px;
cursor:pointer;
}

/* TYPING */

.typing span{

animation:blink 1.4s infinite both;
}

.typing span:nth-child(2){
animation-delay:.2s;
}

.typing span:nth-child(3){
animation-delay:.4s;
}

@keyframes blink{

0%{opacity:.2;}
20%{opacity:1;}
100%{opacity:.2;}

}

/* MOBILE FIX */

@media(max-width:600px){

body{
align-items:stretch;
}

.app{
height:100vh;
max-width:100%;
}

}

</style>
</head>

<body>

<div class="app">

<div class="header">

💚 Safe Space

<div class="controls">

<button id="voiceToggle">🔊</button>
<button id="voiceGender">👩</button>
<button id="clearChat">🗑</button>

</div>

</div>

<div class="chat-area" id="chat"></div>

<div class="input-area">

<input type="text" id="messageInput" placeholder="Share your feelings..." />

<button class="icon-btn" id="micBtn">🎤</button>
<button class="icon-btn" id="sendBtn">➤</button>

</div>

</div>

<script>

const chat=document.getElementById("chat")
const input=document.getElementById("messageInput")
const sendBtn=document.getElementById("sendBtn")

/* SEND MESSAGE */

async function sendMessage(){

if(!input.value.trim()) return

const userText=input.value

chat.innerHTML+=`<div class="message user">${userText}</div>`

input.value=""

chat.innerHTML+=`<div class="message bot typing">Thinking <span>.</span><span>.</span><span>.</span></div>`

chat.scrollTop=chat.scrollHeight

const response=await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:userText
})

})

const data=await response.json()

document.querySelector(".typing").remove()

chat.innerHTML+=`<div class="message bot">${data.reply}</div>`

chat.scrollTop=chat.scrollHeight

}

sendBtn.onclick=sendMessage

input.addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage()
})

</script>

</body>
</html>
