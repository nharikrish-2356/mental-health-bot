<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamaai Mental Health Bot</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#ece5dd;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.app{
width:100%;
max-width:420px;
height:100vh;
background:#efeae2;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
background:#075E54;
color:white;
padding:12px;
display:flex;
align-items:center;
font-size:18px;
font-weight:bold;
}

.header span{
font-size:13px;
margin-left:10px;
opacity:.8;
}

/* CHAT AREA */

.chat-area{
flex:1;
overflow-y:auto;
padding:12px;
display:flex;
flex-direction:column;
}

/* MESSAGE */

.message{
max-width:75%;
padding:8px 10px;
border-radius:8px;
margin:6px 0;
font-size:16px;
position:relative;
word-wrap:break-word;
}

/* BOT MESSAGE */

.bot{
background:white;
align-self:flex-start;
}

/* USER MESSAGE */

.user{
background:#dcf8c6;
align-self:flex-end;
}

/* TIME */

.time{
font-size:10px;
color:#555;
text-align:right;
margin-top:3px;
}

/* INPUT AREA */

.input-area{
background:#f0f0f0;
padding:8px;
display:flex;
align-items:center;
gap:6px;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:none;
font-size:16px;
outline:none;
}

button{
border:none;
background:#075E54;
color:white;
border-radius:50%;
width:40px;
height:40px;
font-size:18px;
cursor:pointer;
}

/* TYPING */

.typing{
background:white;
padding:10px;
border-radius:8px;
width:60px;
}

.typing span{
animation:blink 1.4s infinite both;
}

.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}

@keyframes blink{
0%{opacity:.2;}
20%{opacity:1;}
100%{opacity:.2;}
}

</style>
</head>

<body>

<div class="app">

<div class="header">
🧠 Kamaai
<span>online</span>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-area">

<input 
id="messageInput"
placeholder="Type a message"
/>

<button id="micBtn">🎤</button>
<button id="sendBtn">➤</button>

</div>

</div>

<script>

const chat = document.getElementById("chat")
const input = document.getElementById("messageInput")
const sendBtn = document.getElementById("sendBtn")
const micBtn = document.getElementById("micBtn")

/* LOAD OLD CHAT */

function loadChat(){
const saved = localStorage.getItem("chat")
if(saved){
chat.innerHTML = saved
chat.scrollTop = chat.scrollHeight
}
}

loadChat()

function saveChat(){
localStorage.setItem("chat",chat.innerHTML)
}

/* TIME */

function getTime(){

let now = new Date()

let h = now.getHours()
let m = now.getMinutes()

if(m<10) m="0"+m

return h+":"+m
}

/* ADD MESSAGE */

function addMessage(text,type){

chat.innerHTML += `
<div class="message ${type}">
${text}
<div class="time">${getTime()}</div>
</div>
`

chat.scrollTop = chat.scrollHeight

saveChat()
}

/* TYPING */

function showTyping(){

chat.innerHTML += `
<div class="typing" id="typing">
<span>.</span><span>.</span><span>.</span>
</div>
`

chat.scrollTop = chat.scrollHeight
}

/* REMOVE TYPING */

function removeTyping(){

let t = document.getElementById("typing")

if(t) t.remove()

}

/* SEND MESSAGE */

async function sendMessage(){

if(!input.value.trim()) return

let text = input.value

addMessage(text,"user")

input.value=""

showTyping()

const response = await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:text
})

})

const data = await response.json()

removeTyping()

addMessage(data.reply,"bot")

}

/* BUTTON EVENTS */

sendBtn.onclick = sendMessage

input.addEventListener("keypress",e=>{

if(e.key==="Enter") sendMessage()

})

/* VOICE INPUT */

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition

if(SpeechRecognition){

const recognition = new SpeechRecognition()

recognition.lang="en-IN"

micBtn.onclick = ()=>recognition.start()

recognition.onresult = e =>{

input.value = e.results[0][0].transcript

sendMessage()

}

}

</script>

</body>
</html>
