```html
<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamaai Chat</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#111;
height:100vh;
overflow:hidden;
}

/* APP */

.app{
display:flex;
flex-direction:column;
height:100vh;
max-width:500px;
margin:auto;
background:#efeae2;
}

/* HEADER */

.header{
background:#075e54;
color:white;
padding:14px;
font-size:18px;
display:flex;
align-items:center;
justify-content:space-between;
}

/* CHAT AREA */

.chat{
flex:1;
overflow-y:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:8px;
}

/* MESSAGE */

.msg{
max-width:75%;
padding:10px 12px;
border-radius:8px;
font-size:16px;
line-height:1.4;
word-wrap:break-word;
}

/* BOT */

.bot{
background:white;
align-self:flex-start;
}

/* USER */

.user{
background:#dcf8c6;
align-self:flex-end;
}

/* META */

.meta{
font-size:11px;
color:#666;
margin-top:4px;
text-align:right;
}

/* INPUT AREA */

.input-area{
display:flex;
align-items:center;
padding:10px;
background:#f0f0f0;
gap:6px;
border-top:1px solid #ccc;
}

/* INPUT */

.input{
flex:1;
padding:12px;
border-radius:20px;
border:1px solid #ccc;
font-size:16px;
outline:none;
}

/* BUTTON */

.send{
background:#075e54;
color:white;
border:none;
border-radius:50%;
width:42px;
height:42px;
font-size:18px;
cursor:pointer;
}

/* CLEAR */

.clear{
background:#e53935;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
font-size:12px;
}

.typing{
font-style:italic;
color:gray;
}

</style>

</head>

<body>

<div class="app">

<div class="header">
<span>Kamaai AI</span>
<button class="clear" onclick="clearChat()">Clear</button>
</div>

<div id="chat" class="chat"></div>

<div class="input-area">

<input id="input"
class="input"
placeholder="Type a message..."
onkeypress="if(event.key==='Enter'){sendMessage()}">

<button class="send" onclick="sendMessage()">➤</button>

</div>

</div>

<script>

const chat=document.getElementById("chat")

/* LOAD OLD CHAT */

chat.innerHTML=localStorage.getItem("chatHistory") || ""

scrollBottom()

function scrollBottom(){
chat.scrollTop=chat.scrollHeight
}

/* TIME */

function getTime(){

let d=new Date()

let h=d.getHours()
let m=d.getMinutes()

if(m<10)m="0"+m

return h+":"+m
}

/* ADD MESSAGE */

function addMessage(text,type){

let msg=document.createElement("div")
msg.className="msg "+type

msg.innerHTML=`
${text}
<div class="meta">${getTime()}</div>
`

chat.appendChild(msg)

scrollBottom()

localStorage.setItem("chatHistory",chat.innerHTML)

}

/* TYPING */

function showTyping(){

let typing=document.createElement("div")
typing.className="msg bot typing"
typing.innerText="Typing..."

chat.appendChild(typing)

scrollBottom()

return typing

}

/* SEND */

async function sendMessage(){

let input=document.getElementById("input")

let text=input.value.trim()

if(!text) return

addMessage(text,"user")

input.value=""

let typing=showTyping()

try{

let res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
})

let data=await res.json()

typing.remove()

addMessage(data.reply,"bot")

}catch{

typing.remove()

addMessage("Server error","bot")

}

}

/* CLEAR */

function clearChat(){

chat.innerHTML=""
localStorage.removeItem("chatHistory")

}

</script>

</body>
</html>
