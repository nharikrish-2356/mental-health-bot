```html
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Chatbot</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#e5ddd5;
}

.chat-container{
display:flex;
flex-direction:column;
height:100vh;
max-width:600px;
margin:auto;
background:#efeae2;
}

.header{
background:#075e54;
color:white;
padding:15px;
font-size:20px;
text-align:center;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.message{
padding:10px 14px;
margin:6px 0;
border-radius:10px;
max-width:75%;
font-size:16px;
line-height:1.4;
position:relative;
}

.user{
background:#dcf8c6;
align-self:flex-end;
}

.bot{

}

.time{
font-size:10px;
color:gray;

margin-top:3px;
}

.input-area{
display:flex;

background:#f0f0f0;
}

#input{
flex:1;
padding:12px;

border:1px solid #ccc;

}

button{
margin-left:8px;
padding:10px 14px;
font-size:16px;
border:none;
border-radius:50%;
background:#075e54;

}

.clear-btn{
border-radius:8px;
padding:8px 12px;
background:red;
}

.typing{
font-style:italic;
font-size:14px;
color:gray;
}

</style>
</head>

<body>

<div class="chat-container">

<div class="header">
AI Chatbot 🤖
<button class="clear-btn" onclick="clearChat()">Clear</button>
</div>

<div id="chat" class="chat-box"></div>

<div class="input-area">
<input id="input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
<button onclick="sendMessage()">➤</button>
</div>

</div>

<script>

let chat=document.getElementById("chat");

chat.innerHTML=localStorage.getItem("chatHistory") || "";

let memory=JSON.parse(localStorage.getItem("memory")) || {};

function remember(key,value){
memory[key]=value;
localStorage.setItem("memory",JSON.stringify(memory));
}

function recall(key){
return memory[key];
}

function getTime(){
let d=new Date();
let h=d.getHours();
let m=d.getMinutes();
if(m<10){m="0"+m;}
return h+":"+m;
}

function addMessage(text,className){

let msg=document.createElement("div");
msg.className="message "+className;

msg.innerHTML=text+"<span class='time'>"+getTime()+"</span>";

chat.appendChild(msg);

chat.scrollTop=chat.scrollHeight;

localStorage.setItem("chatHistory",chat.innerHTML);

}

function botTyping(){

let typing=document.createElement("div");
typing.className="message bot typing";
typing.innerText="Typing...";
chat.appendChild(typing);

chat.scrollTop=chat.scrollHeight;

return typing;

}

function botReply(message){

message=message.toLowerCase();

if(message.includes("my name is")){
let name=message.split("my name is")[1].trim();
remember("name",name);
return "Nice to meet you "+name+" 😊";
}

if(message.includes("what is my name")){
let name=recall("name");
if(name){
return "Your name is "+name;
}
return "I don't know your name yet.";
}

if(message.includes("hello")){
return "Hello 👋 How can I help you?";
}

if(message.includes("how are you")){
return "I'm good 😊 How are you?";
}

if(message.includes("sad")){
return "I'm sorry you feel sad. I'm here for you ❤️";
}

if(message.includes("happy")){
return "That's great to hear! 😊";
}

return "I'm still learning. Tell me more.";
}

function sendMessage(){

let input=document.getElementById("input");
let text=input.value.trim();

if(text==="") return;

addMessage(text,"user");

input.value="";

let typing=botTyping();

setTimeout(()=>{

typing.remove();

let reply=botReply(text);

addMessage(reply,"bot");

},1200);

}

function clearChat(){

chat.innerHTML="";
localStorage.removeItem("chatHistory");

}

</script>

</body>
</html>
