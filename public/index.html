<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mental Health Bot</title>

<style>

body{
margin:0;
font-family:Arial;
background:#ece5dd;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
background:#075e54;
color:white;
padding:14px;
font-size:18px;
font-weight:bold;
}

/* CHAT AREA */

#chat{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
}

/* MESSAGE */

.message{
max-width:70%;
padding:8px 12px;
margin:6px;
border-radius:10px;
font-size:14px;
word-wrap:break-word;
}

/* USER */

.user{
background:#dcf8c6;
align-self:flex-end;
}

/* BOT */

.bot{
background:white;
align-self:flex-start;
}

/* INPUT AREA */

.input-area{
display:flex;
padding:10px;
background:#f0f0f0;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
outline:none;
}

button{
margin-left:8px;
padding:10px 16px;
border:none;
background:#075e54;
color:white;
border-radius:20px;
cursor:pointer;
}

/* TYPING */

.typing{
font-style:italic;
color:#777;
font-size:13px;
margin-left:6px;
}

</style>

</head>

<body>

<div class="header">
Mental Health Bot
</div>

<div id="chat"></div>

<div class="input-area">
<input id="msg" placeholder="Type a message...">
<button onclick="send()">Send</button>
</div>

<script>

/* LOAD OLD CHAT */

window.onload=function(){

let history=localStorage.getItem("chatHistory");

if(history){

document.getElementById("chat").innerHTML=history;

}

}

/* SAVE CHAT */

function saveChat(){

localStorage.setItem(
"chatHistory",
document.getElementById("chat").innerHTML
);

}

/* ADD MESSAGE */

function addMessage(text,type){

let chat=document.getElementById("chat");

let div=document.createElement("div");

div.className="message "+type;

div.innerText=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

saveChat();

}

/* SEND MESSAGE */

async function send(){

let input=document.getElementById("msg");

let text=input.value.trim();

if(!text) return;

addMessage(text,"user");

input.value="";

/* BOT TYPING */

let chat=document.getElementById("chat");

let typing=document.createElement("div");

typing.className="typing";

typing.id="typing";

typing.innerText="Bot is typing...";

chat.appendChild(typing);

chat.scrollTop=chat.scrollHeight;

try{

let res=await fetch("/chat",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({message:text})

});

let data=await res.json();

/* REMOVE TYPING */

document.getElementById("typing").remove();

addMessage(data.reply,"bot");

}catch(e){

document.getElementById("typing").remove();

addMessage("Server error. Please try again.","bot");

}

}

/* ENTER KEY SEND */

document
.getElementById("msg")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){

send();

}

});

</script>

</body>

</html>
