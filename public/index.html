<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kamaai Chat</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#e5ddd5;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.app{
width:100%;
max-width:430px;
height:100vh;
display:flex;
flex-direction:column;
background:#efeae2;
}

/* HEADER */

.header{
background:#075e54;
color:white;
padding:14px;
font-size:20px;
font-weight:bold;
}

/* CHAT AREA */

.chat-area{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

/* MESSAGE */

.message{
max-width:75%;
padding:12px 14px;
font-size:17px;
border-radius:10px;
word-wrap:break-word;
}

/* USER */

.user{
align-self:flex-end;
background:#dcf8c6;
}

/* BOT */

.bot{
align-self:flex-start;
background:white;
}

/* TIME */

.time{
font-size:11px;
color:#666;
text-align:right;
margin-top:4px;
}

/* INPUT BAR */

.input-area{
background:#f0f0f0;
padding:10px;
display:flex;
gap:8px;
align-items:center;
}

input{
flex:1;
padding:14px;
font-size:17px;
border-radius:25px;
border:none;
outline:none;
}

/* BUTTONS */

button{
width:45px;
height:45px;
border-radius:50%;
border:none;
background:#075e54;
color:white;
font-size:18px;
cursor:pointer;
}

/* TYPING */

.typing{
background:white;
padding:12px;
border-radius:10px;
width:60px;
}

.typing span{
animation:blink 1.4s infinite both;
}

.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}

@keyframes blink{
0%{opacity:.2}
20%{opacity:1}
100%{opacity:.2}
}

</style>
</head>

<body>

<div class="app">

<div class="header">
🧠 Kamaai Bot
</div>

<div id="chat" class="chat-area"></div>

<div class="input-area">

<input 
id="messageInput"
placeholder="Type a message..."
>

<button id="micBtn">🎤</button>

<button id="sendBtn">➤</button>

</div>

</div>

<script>

const chat=document.getElementById("chat")
const input=document.getElementById("messageInput")
const sendBtn=document.getElementById("sendBtn")
const micBtn=document.getElementById("micBtn")

/* LOAD OLD CHAT */

function loadChat(){
let saved=localStorage.getItem("chat")
if(saved){
chat.innerHTML=saved
chat.scrollTop=chat.scrollHeight
}
}

loadChat()

function saveChat(){
localStorage.setItem("chat",chat.innerHTML)
}

/* TIME */

function getTime(){

let now=new Date()

let h=now.getHours()
let m=now.getMinutes()

if(m<10) m="0"+m

return h+":"+m
}

/* ADD MESSAGE */

function addMessage(text,type){

chat.innerHTML+=`
<div class="message ${type}">
${text}
<div class="time">${getTime()}</div>
</div>
`

chat.scrollTop=chat.scrollHeight

saveChat()

}

/* TYPING */

function showTyping(){

chat.innerHTML+=`
<div class="typing" id="typing">
<span>.</span>
<span>.</span>
<span>.</span>
</div>
`

chat.scrollTop=chat.scrollHeight

}

function removeTyping(){

let t=document.getElementById("typing")

if(t) t.remove()

}

/* SEND MESSAGE */

async function sendMessage(){

let text=input.value.trim()

if(!text) return

addMessage(text,"user")

input.value=""

showTyping()

const res=await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:text
})

})

const data=await res.json()

removeTyping()

addMessage(data.reply,"bot")

}

/* EVENTS */

sendBtn.onclick=sendMessage

input.addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage()
})

/* VOICE INPUT */

const SpeechRecognition=
window.SpeechRecognition ||
window.webkitSpeechRecognition

if(SpeechRecognition){

const recognition=new SpeechRecognition()

recognition.lang="en-IN"

micBtn.onclick=()=>recognition.start()

recognition.onresult=e=>{

input.value=e.results[0][0].transcript

sendMessage()

}

}

</script>

</body>

</html>
