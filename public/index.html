<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Safe Space - Calm AI</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(-45deg, #fbc2eb, #a6c1ee, #fddb92, #d4fc79);
  background-size: 400% 400%;
  animation: gradientFlow 20s ease infinite;
}

@keyframes gradientFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.app {
  width: 400px;
  height: 720px;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(15px);
  display: flex;
  flex-direction: column;
  border-radius: 25px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  overflow: hidden;
}

.header {
  padding: 12px;
  display: flex;
  align-items: center;
  font-weight: bold;
  font-size: 16px;
}

.controls {
  margin-left: auto;
  display: flex;
  gap: 5px;
}

.chat-area {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.message {
  max-width: 75%;
  padding: 10px 14px;
  border-radius: 15px;
  margin-bottom: 8px;
  font-size: 14px;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

.bot {
  background: white;
  align-self: flex-start;
}

.user {
  background: linear-gradient(135deg, #d4fc79, #96e6a1);
  align-self: flex-end;
}

.input-area {
  display: flex;
  padding: 10px;
}

input {
  flex: 1;
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  outline: none;
}

button {
  border: none;
  border-radius: 20px;
  padding: 6px 10px;
  cursor: pointer;
  font-size: 12px;
}

.icon-btn {
  border-radius: 50%;
  width: 38px;
  height: 38px;
  font-size: 16px;
}

.typing span {
  animation: blink 1.4s infinite both;
}
.typing span:nth-child(2){ animation-delay: .2s;}
.typing span:nth-child(3){ animation-delay: .4s;}

@keyframes blink {
  0%{opacity:.2;}
  20%{opacity:1;}
  100%{opacity:.2;}
}

.mood-happy { background: linear-gradient(135deg,#fddb92,#d1fdff); }
.mood-sad { background: linear-gradient(135deg,#cfd9df,#e2ebf0); }
.mood-angry { background: linear-gradient(135deg,#f85032,#e73827); }
</style>
</head>

<body>

<div class="app">

<div class="header">
  💚 Safe Space
  <div class="controls">
    <button id="voiceToggle">🔊</button>
    <button id="voiceGender">👩</button>
    <button id="clearChat">🗑</button>
  </div>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-area">
  <input type="text" id="messageInput" placeholder="Share your feelings..." />
  <button class="icon-btn" id="micBtn">🎤</button>
  <button class="icon-btn" id="sendBtn">➤</button>
</div>

</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");
const micBtn = document.getElementById("micBtn");
const voiceToggle = document.getElementById("voiceToggle");
const voiceGender = document.getElementById("voiceGender");
const clearChat = document.getElementById("clearChat");

let voices = [];
let voiceEnabled = true;
let femaleVoice = true;

/* Load voices */
function loadVoices() {
  voices = speechSynthesis.getVoices();
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

/* Emotion detection */
function detectMood(text) {
  text = text.toLowerCase();
  if (text.includes("happy") || text.includes("good")) return "mood-happy";
  if (text.includes("sad") || text.includes("cry")) return "mood-sad";
  if (text.includes("angry") || text.includes("mad")) return "mood-angry";
  return "";
}

/* Speak */
function speakText(text) {
  if (!voiceEnabled) return;
  speechSynthesis.cancel();
  const speech = new SpeechSynthesisUtterance(text);

  const selected = voices.find(v =>
    femaleVoice ? v.name.toLowerCase().includes("female") : v.name.toLowerCase().includes("male")
  );

  if (selected) speech.voice = selected;
  speech.rate = 0.95;
  speechSynthesis.speak(speech);
}

/* Save history */
function saveChat() {
  localStorage.setItem("chatHistory", chat.innerHTML);
}
function loadChat() {
  const saved = localStorage.getItem("chatHistory");
  if (saved) chat.innerHTML = saved;
}
loadChat();

/* Send message */
async function sendMessage() {
  if (!input.value.trim()) return;

  const userText = input.value;
  const moodClass = detectMood(userText);
  document.body.className = moodClass;

  chat.innerHTML += `<div class="message user">${userText}</div>`;
  input.value = "";

  chat.innerHTML += `<div class="message bot typing">Thinking <span>.</span><span>.</span><span>.</span></div>`;
  chat.scrollTop = chat.scrollHeight;

  const response = await fetch("/chat", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({message:userText})
  });

  const data = await response.json();
  document.querySelector(".typing").remove();

  chat.innerHTML += `<div class="message bot">${data.reply}</div>`;
  chat.scrollTop = chat.scrollHeight;

  speakText(data.reply);
  saveChat();
}

sendBtn.onclick = sendMessage;
input.addEventListener("keypress", e=>{ if(e.key==="Enter") sendMessage(); });

/* Voice input */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
  const recognition = new SpeechRecognition();
  recognition.lang="en-IN";
  micBtn.onclick=()=> recognition.start();
  recognition.onresult=e=>{
    input.value = e.results[0][0].transcript;
    sendMessage();
  };
}

/* Controls */
voiceToggle.onclick=()=>{
  voiceEnabled=!voiceEnabled;
  voiceToggle.textContent= voiceEnabled ? "🔊" : "🔇";
};

voiceGender.onclick=()=>{
  femaleVoice=!femaleVoice;
  voiceGender.textContent= femaleVoice ? "👩" : "👨";
};

clearChat.onclick=()=>{
  chat.innerHTML="";
  localStorage.removeItem("chatHistory");
};
</script>

</body>
</html>
