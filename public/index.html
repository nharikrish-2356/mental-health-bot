<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kamaai Mental Health Bot</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#ece5dd;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
background:#075e54;
color:white;
padding:15px;
font-size:18px;
font-weight:bold;
text-align:center;
}

/* CHAT AREA */

#chat{
flex:1;
overflow-y:auto;
padding:12px;
display:flex;
flex-direction:column;
width:100%;
}

/* MESSAGE BUBBLE */

.message{
max-width:75%;
padding:10px 14px;
margin:6px 0;
border-radius:12px;
font-size:14px;
line-height:1.4;
word-wrap:break-word;
}

/* USER MESSAGE */

.user{
align-self:flex-end;
background:#dcf8c6;
}

/* BOT MESSAGE */

.bot{
align-self:flex-start;
background:white;
}

/* INPUT AREA */

.input-area{
display:flex;
padding:10px;
background:#f0f0f0;
width:100%;
}

#msg{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
outline:none;
font-size:14px;
}

button{
margin-left:8px;
padding:10px 16px;
border:none;
background:#075e54;
color:white;
border-radius:20px;
font-size:14px;
cursor:pointer;
}

/* TYPING */

.typing{
font-style:italic;
font-size:13px;
color:#777;
margin:5px;
}

</style>

</head>

<body>

<div class="header">
🧠 Kamaai Mental Health Bot
</div>

<div id="chat"></div>

<div class="input-area">
<input id="msg" placeholder="Type a message...">
<button onclick="sendMessage()">Send</button>
</div>

<script>

/* LOAD CHAT HISTORY */

window.onload = function(){

let history = localStorage.getItem("chatHistory");

if(history){
document.getElementById("chat").innerHTML = history;
scrollBottom();
}

}

/* SAVE CHAT */

function saveChat(){
localStorage.setItem(
"chatHistory",
document.getElementById("chat").innerHTML
);
}

/* SCROLL */

function scrollBottom(){
let chat=document.getElementById("chat");
chat.scrollTop=chat.scrollHeight;
}

/* ADD MESSAGE */

function addMessage(text,type){

let chat=document.getElementById("chat");

let msg=document.createElement("div");
msg.className="message "+type;
msg.innerText=text;

chat.appendChild(msg);

scrollBottom();
saveChat();

}

/* SEND MESSAGE */

async function sendMessage(){

let input=document.getElementById("msg");
let text=input.value.trim();

if(!text) return;

addMessage(text,"user");

input.value="";

/* typing */

let chat=document.getElementById("chat");

let typing=document.createElement("div");
typing.className="typing";
typing.id="typing";
typing.innerText="Bot is typing...";

chat.appendChild(typing);

scrollBottom();

try{

let response = await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:text})
});

let data = await response.json();

/* remove typing */

document.getElementById("typing").remove();

addMessage(data.reply,"bot");

}catch(error){

document.getElementById("typing").remove();
addMessage("Server error. Try again.","bot");

}

}

/* ENTER KEY SEND */

document
.getElementById("msg")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendMessage();
}

});

</script>

</body>
</html>
