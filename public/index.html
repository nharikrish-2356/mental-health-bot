```html
<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamaai Chat</title>

<style>

body{
margin:0;
font-family: "Segoe UI", Arial;
background:#111;
}

/* CHAT APP */

.app{
display:flex;
flex-direction:column;
height:100vh;
max-width:500px;
margin:auto;
background:#efeae2;
}

/* HEADER */

.header{
background:#075e54;
color:white;
padding:12px;
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:38px;
height:38px;
border-radius:50%;
background:#ddd;
}

.title{
flex:1;
font-weight:600;
}

.menu{
font-size:20px;
cursor:pointer;
}

/* CHAT AREA */

.chat{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:6px;
background-image:url("https://i.imgur.com/6Iej2c3.png");
}

/* MESSAGE */

.msg{
max-width:75%;
padding:8px 10px;
border-radius:8px;
font-size:16px;
line-height:1.4;
position:relative;
}

.bot{
background:white;
align-self:flex-start;
}

.user{
background:#dcf8c6;
align-self:flex-end;
}

/* TIME */

.time{
font-size:11px;
color:#666;
margin-left:6px;
}

/* MESSAGE FOOTER */

.meta{
display:flex;
justify-content:flex-end;
align-items:center;
margin-top:2px;
gap:4px;
}

/* TICKS */

.ticks{
font-size:12px;
color:#4fc3f7;
}

/* INPUT AREA */

.input-area{
display:flex;
align-items:center;
padding:8px;
background:#f0f0f0;
gap:6px;
}

.input{
flex:1;
padding:12px;
border-radius:20px;
border:none;
font-size:16px;
outline:none;
}

.send{
background:#075e54;
color:white;
border:none;
border-radius:50%;
width:42px;
height:42px;
font-size:18px;
cursor:pointer;
}

.clear{
background:#e53935;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
font-size:12px;
}

/* TYPING */

.typing{
font-style:italic;
color:gray;
}

</style>

</head>

<body>

<div class="app">

<!-- HEADER -->

<div class="header">

<div class="avatar"></div>

<div class="title">
Kamaai AI
</div>

<button class="clear" onclick="clearChat()">Clear</button>

<div class="menu">⋮</div>

</div>

<!-- CHAT -->

<div id="chat" class="chat"></div>

<!-- INPUT -->

<div class="input-area">

<input id="input" class="input" placeholder="Type a message"
onkeypress="if(event.key==='Enter'){sendMessage()}">

<button class="send" onclick="sendMessage()">➤</button>

</div>

</div>

<script>

const chat=document.getElementById("chat")

/* LOAD OLD CHAT */

chat.innerHTML=localStorage.getItem("chatHistory") || ""

function getTime(){

let d=new Date()

let h=d.getHours()
let m=d.getMinutes()

if(m<10)m="0"+m

return h+":"+m

}

/* ADD MESSAGE */

function addMessage(text,type){

let msg=document.createElement("div")
msg.className="msg "+type

let html=`${text}
<div class="meta">
<span class="time">${getTime()}</span>
${type==="user" ? "<span class='ticks'>✓✓</span>" : ""}
</div>
`

msg.innerHTML=html

chat.appendChild(msg)

chat.scrollTop=chat.scrollHeight

localStorage.setItem("chatHistory",chat.innerHTML)

}

/* TYPING */

function showTyping(){

let typing=document.createElement("div")
typing.className="msg bot typing"
typing.innerText="Typing..."

chat.appendChild(typing)

chat.scrollTop=chat.scrollHeight

return typing

}

/* SEND MESSAGE */

async function sendMessage(){

let input=document.getElementById("input")

let text=input.value.trim()

if(!text) return

addMessage(text,"user")

input.value=""

let typing=showTyping()

try{

let res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
})

let data=await res.json()

typing.remove()

addMessage(data.reply,"bot")

}catch{

typing.remove()

addMessage("Server error","bot")

}

}

/* CLEAR CHAT */

function clearChat(){

chat.innerHTML=""
localStorage.removeItem("chatHistory")

}

</script>

</body>
</html>
