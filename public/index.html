<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kamaai Mental Health Bot</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, sans-serif;
}

/* BODY */

body{
background:#ece5dd;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
background:#075e54;
color:white;
padding:20px;
font-size:24px;
font-weight:bold;
text-align:center;
}

/* CHAT AREA */

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
}

/* MESSAGES */

.message{
max-width:85%;
padding:16px 20px;
margin:10px 0;
border-radius:18px;
font-size:20px;
line-height:1.6;
word-wrap:break-word;
}

/* USER MESSAGE */

.user{
align-self:flex-end;
background:#dcf8c6;
}

/* BOT MESSAGE */

.bot{
align-self:flex-start;
background:white;
}

/* INPUT AREA */

.input-area{
display:flex;
padding:16px;
background:#f0f0f0;
}

/* TEXT INPUT */

#msg{
flex:1;
padding:18px;
border-radius:30px;
border:1px solid #ccc;
outline:none;
font-size:20px;
}

/* SEND BUTTON */

button{
margin-left:10px;
padding:16px 24px;
border:none;
background:#075e54;
color:white;
border-radius:30px;
font-size:18px;
cursor:pointer;
}

/* TYPING */

.typing{
font-size:18px;
color:#777;
margin:10px;
}

</style>

</head>

<body>

<div class="header">
🧠 Kamaai Mental Health Bot
</div>

<div id="chat"></div>

<div class="input-area">
<input id="msg" placeholder="Type your message...">
<button onclick="sendMessage()">Send</button>
</div>

<script>

/* LOAD CHAT HISTORY */

window.onload = function(){

let history = localStorage.getItem("chatHistory");

if(history){
document.getElementById("chat").innerHTML = history;
scrollBottom();
}

}

/* SAVE CHAT */

function saveChat(){

localStorage.setItem(
"chatHistory",
document.getElementById("chat").innerHTML
);

}

/* SCROLL */

function scrollBottom(){
let chat=document.getElementById("chat");
chat.scrollTop=chat.scrollHeight;
}

/* ADD MESSAGE */

function addMessage(text,type){

let chat=document.getElementById("chat");

let msg=document.createElement("div");
msg.className="message "+type;
msg.innerText=text;

chat.appendChild(msg);

scrollBottom();
saveChat();

}

/* SEND MESSAGE */

async function sendMessage(){

let input=document.getElementById("msg");
let text=input.value.trim();

if(!text) return;

addMessage(text,"user");

input.value="";

/* typing indicator */

let chat=document.getElementById("chat");

let typing=document.createElement("div");
typing.className="typing";
typing.id="typing";
typing.innerText="Bot is typing...";

chat.appendChild(typing);

scrollBottom();

try{

let response = await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:text})
});

let data = await response.json();

document.getElementById("typing").remove();

addMessage(data.reply,"bot");

}catch(e){

document.getElementById("typing").remove();
addMessage("Server error. Please try again.","bot");

}

}

/* ENTER KEY SEND */

document
.getElementById("msg")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendMessage();
}

});

</script>

</body>
</html>
