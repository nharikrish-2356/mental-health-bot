<!DOCTYPE html>
<html>
<head>
<title>AI Support Chat</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chatbox{
    width:350px;
    height:520px;
    background:white;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    overflow:hidden;
}

.header{
    background:#764ba2;
    color:white;
    padding:15px;
    text-align:center;
    font-weight:bold;
}

.messages{
    flex:1;
    padding:15px;
    overflow-y:auto;
}

.msg{
    margin:10px 0;
    padding:10px 14px;
    border-radius:15px;
    max-width:70%;
}

.user{
    background:#667eea;
    color:white;
    margin-left:auto;
}

.bot{
    background:#eee;
}

.inputBox{
    display:flex;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    border:none;
    padding:15px;
    outline:none;
}

button{
    border:none;
    padding:15px 20px;
    background:#764ba2;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="chatbox">

<div class="header">AI Support Bot</div>

<div class="messages" id="messages"></div>

<div class="inputBox">
<input id="text" placeholder="Type message...">
<button onclick="send()">Send</button>
</div>

</div>

<script>
async function send(){

    const input = document.getElementById("text");
    const msg = input.value;

    if(!msg) return;

    addMessage(msg,"user");

    input.value="";

    const res = await fetch("/chat",{
        method:"POST",
        headers:{ "Content-Type":"application/json"},
        body:JSON.stringify({message:msg})
    });

    const data = await res.json();

    addMessage(data.reply,"bot");
}

function addMessage(text,type){

    const div = document.createElement("div");
    div.className="msg "+type;
    div.innerText=text;

    document.getElementById("messages").appendChild(div);

}
</script>

</body>
</html>
